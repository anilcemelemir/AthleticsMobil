services:
  postgres:
    image: postgres:16-alpine
    container_name: gymsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gymsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - gymsync_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gymsync"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gymsync_pgdata:
