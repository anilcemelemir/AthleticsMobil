<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Strive Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Lexend:wght@700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#d9e3f4",

                        "secondary": "#bdc7d8",

                        "on-tertiary": "#2c3136",

                        "inverse-surface": "#ebe2d0",

                        "on-primary-fixed-variant": "#574500",
                        "secondary-fixed-dim": "#bdc7d8",
                        "tertiary-container": "#cdd1d7",
                        "inverse-primary": "#735c00",
                        "on-error": "#690005",
                        "outline": "#9a9078",
                        "primary-container": "#facc15",

                        "on-primary-fixed": "#231b00",

                        "error": "#ffb4ab",
                        "on-surface": "#ebe2d0",
                        "surface-container-high": "#2e2a1e",
                        "primary-fixed-dim": "#eec200",
                        "tertiary-fixed": "#dfe3e9",

                        "inverse-on-surface": "#353024",

                        "on-primary": "#3c2f00",
                        "on-secondary-container": "#afb9c9",

                        "tertiary": "#e9edf3",

                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit-xl": "40px",
                        "container-margin": "20px",
                        "unit-xs": "4px",
                        "unit-sm": "8px",
                        "gutter": "12px",
                        "unit-md": "16px",
                        "unit-lg": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Lexend"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Lexend"],
                        "headline-xl": ["Lexend"],
                        "label-bold": ["Lexend"]

                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-5 py-4 bg-black border-b border-gray-700 sticky top-0 z-40">
<button class="text-primary-container p-2 rounded-full hover:bg-gray-800 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary-container uppercase tracking-tighter italic">STRIVE</h1>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden border border-outline-variant">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="Close-up portrait of a fitness user with sweat on their brow looking determined, dramatic gym lighting, dark background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBo20Br0k2e6NvO57W3zJ8X4-Aql0fJZ609SIdao3l0LZ18cEHw_sCnb1UIQCSrF8dyNC0SZSf91bb3WpTy9ZGpcHOLHa32erWPHwDUnXWCjFn-o6sMXXIJ8bOTlKwBgv7vuGIxiw5Wxa-PpzP-vMOX_pmsox5VkmVQ-_D2Np4v76DIlvZzafHVZs-utbAQoDNwCc3pKVzWBIvoOkfNpEsFtuCu0mNyTmccs0XBabbKTaGSMLTnzd1ggKGBfQPV50WnW1qHVm0TJAg"/>
</div>
</header>
<main class="px-container-margin py-unit-xl max-w-4xl mx-auto space-y-unit-xl">
<!-- Greeting -->
<section class="flex items-center justify-between">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-background">Welcome back, <span class="text-primary-container">Alex</span></h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-unit-sm">Ready to crush today's goals?</p>
</div>
<button class="bg-primary-container text-on-primary-fixed p-3 rounded-full shadow-[0_0_15px_rgba(250,204,21,0.3)] hover:scale-105 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
</section>
<!-- Bento Grid Layout -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Today's Activity (Large Progress Ring) -->
<div class="bg-surface-container rounded-xl p-unit-lg border border-outline-variant flex flex-col items-center justify-center col-span-1 md:row-span-2 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-surface-container-high to-surface-container opacity-50 z-0"></div>
<h3 class="font-label-bold text-label-bold text-on-surface-variant uppercase mb-unit-lg z-10 w-full text-left flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container">directions_run</span> Today's Activity
                </h3>
<div class="relative w-48 h-48 z-10">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle class="text-outline-variant" cx="50" cy="50" fill="transparent" r="40" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary-container drop-shadow-[0_0_8px_rgba(250,204,21,0.6)] transition-all duration-1000 ease-out" cx="50" cy="50" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="62.8" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-headline-xl text-headline-xl text-on-background">8.5k</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mt-1">/ 10k Steps</span>
</div>
</div>
<div class="mt-unit-lg w-full flex justify-between z-10">
<div class="text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase">Goal</p>
<p class="font-body-lg text-body-lg text-on-background font-bold">75%</p>
</div>
<div class="text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase">Active</p>
<p class="font-body-lg text-body-lg text-on-background font-bold">45m</p>
</div>
</div>
</div>
<!-- Calories Burned -->
<div class="bg-surface-container rounded-xl p-unit-md border border-outline-variant flex items-center justify-between col-span-1">
<div>
<h3 class="font-label-bold text-label-bold text-on-surface-variant uppercase flex items-center gap-2 mb-unit-sm">
<span class="material-symbols-outlined text-error">local_fire_department</span> Calories
                    </h3>
<div class="flex items-baseline gap-2">
<span class="font-headline-lg text-headline-lg text-on-background">1,240</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">kcal</span>
</div>
</div>
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-primary-container text-3xl">trending_up</span>
</div>
</div>
<!-- Workout Time -->
<div class="bg-surface-container rounded-xl p-unit-md border border-outline-variant flex items-center justify-between col-span-1">
<div>
<h3 class="font-label-bold text-label-bold text-on-surface-variant uppercase flex items-center gap-2 mb-unit-sm">
<span class="material-symbols-outlined text-secondary-fixed">timer</span> Duration
                    </h3>
<div class="flex items-baseline gap-2">
<span class="font-headline-lg text-headline-lg text-on-background">1h 15m</span>
</div>
</div>
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-secondary-fixed text-3xl">schedule</span>
</div>
</div>
<!-- Current Program Card -->
<div class="bg-surface-container rounded-xl overflow-hidden border border-outline-variant col-span-1 md:col-span-2 relative group cursor-pointer hover:border-primary-container transition-colors">
<div class="absolute inset-0 bg-black/60 z-10 transition-opacity group-hover:bg-black/40"></div>
<img alt="Workout Program" class="w-full h-48 object-cover absolute inset-0 z-0" data-alt="Muscular athlete performing heavy deadlift in a gritty, dark warehouse gym with dramatic rim lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWhRomIiHPl0xj3vn_k7yUqzlwv-w428WKukIHAQIrOBsy5GlVJh4CAQJlIpQeyEy9YgjjE_rOPOreoVs8MlPg94U1uTZXRWtk7i9EPA0ymeqLlxC3MuQWTFkmBl3Avck3JLWC27cAa_pTznCwo7oEPhU6o0sEQlo7Tf0ox63OcGCaamy1L0m2GqkdX8AxTQ1zMTumhnlzf4vp9T2kDJtU0Lr09x8Eo93cBp2CC2nCdH0STlKxUZ_XpWjHMFXLJMnNSFAGpQ-bQ-4"/>
<div class="relative z-20 p-unit-lg h-full flex flex-col justify-between">
<div class="flex justify-between items-start">
<span class="bg-surface-container-high text-on-background font-label-sm text-label-sm uppercase px-3 py-1 rounded-sm border border-outline-variant">Next Up</span>
<span class="material-symbols-outlined text-primary-container drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]">play_circle</span>
</div>
<div class="mt-8">
<h3 class="font-headline-md text-headline-md text-on-background mb-1">Heavy Pull Day</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Hypertrophy Phase • Week 3</p>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-gray-900 px-2 pb-safe border-t border-gray-700 z-50 md:hidden">
<button class="flex flex-col items-center justify-center text-primary-container border-t-2 border-primary-container pt-2 pb-3 flex-1 hover:text-yellow-200 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-label-bold text-[10px] font-bold uppercase mt-1">Dash</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-500 pt-2 pb-3 flex-1 hover:text-yellow-200 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">fitness_center</span>
<span class="font-label-bold text-[10px] font-bold uppercase mt-1">Workouts</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-500 pt-2 pb-3 flex-1 hover:text-yellow-200 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">monitoring</span>
<span class="font-label-bold text-[10px] font-bold uppercase mt-1">Stats</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-500 pt-2 pb-3 flex-1 hover:text-yellow-200 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">person</span>
<span class="font-label-bold text-[10px] font-bold uppercase mt-1">Profile</span>
</button>
</nav>
</body></html>
