<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-black text-yellow-400 font-lexend font-bold uppercase tracking-wider docked full-width top-0 border-b border-gray-700 flat no shadows flex items-center justify-between w-full h-16 px-5 z-50">
<button aria-label="Go back" class="hover:bg-gray-900 active:scale-95 transition-transform p-2 -ml-2 rounded-full flex items-center justify-center text-yellow-400">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-black text-yellow-400 m-0">CREATE PROFILE</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-container-margin py-unit-xl relative">
<!-- Background Accent Graphic (Subtle Brutalist lines) -->
<div aria-hidden="true" class="absolute top-0 right-0 w-64 h-64 border-r border-b border-surface-container-high opacity-20 pointer-events-none"></div>
<div class="flex-1 flex flex-col">
<div class="mb-unit-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-unit-xs">GEAR UP.</h2>
<p class="font-body-md text-body-md text-secondary">Calibrate your vital stats for precise performance tracking.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-unit-lg flex-1"><!-- Invitation Code Input -->
<div class="flex flex-col gap-unit-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-widest" for="inviteCode">Invitation Code</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-unit-md text-outline" data-icon="key">key</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface py-unit-md pl-12 pr-unit-md font-body-lg text-body-lg rounded-DEFAULT focus:border-primary-container focus:outline-none placeholder:text-surface-container-highest transition-colors uppercase" id="inviteCode" maxlength="6" placeholder="ENTER YOUR 6-DIGIT CODE" type="text"/>
</div>
</div>
<!-- Full Name Input -->
<!-- Fitness Goal Dropdown -->
<!-- Physical Stats Grid -->
<!-- Spacer to push CTA to bottom if needed, though mt-auto on CTA works too -->
<div class="flex-1"></div>
<!-- Primary CTA -->
<button class="w-full mt-unit-xl bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 px-unit-md rounded-DEFAULT uppercase tracking-tight shadow-[0_0_24px_rgba(250,204,21,0.15)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group border border-transparent hover:border-primary-fixed" type="button">
<span>START YOUR JOURNEY</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
</form>
</div>
</main>
